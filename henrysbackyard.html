  <style>
    body {
      background: teal;
      margin: 0;
      padding: 20px;
      font-family: sans-serif;
    }

    /* TOP MESSAGE WINDOW */
    .top-window {
      width: calc(100% - 40px);
      margin: 0 auto 20px auto;
    }

    .top-window .window-body {
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      padding: 20px;
    }

    /* GIF WINDOWS */
    .gif-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .window {
      width: 100%;
    }

    .window-body {
      text-align: center;
      padding: 10px;
    }

    img {
      width: 100%;
      max-width: 300px;
      border: 2px inset white;
    }
  </style>
</head>
