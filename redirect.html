<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>System Redirect</title>

  <link rel="stylesheet" href="https://unpkg.com/98.css">

  <style>
    body {
      background: teal;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
    }

    .window {
      width: 360px;
    }

    .content {
      text-align: center;
    }

    /* segmented bar */
    .seg-bar {
      width: 100%;
      height: 18px;
      background: #c0c0c0;
      border: 2px inset white;
      display: flex;
      gap: 2px;
      padding: 2px;
      box-sizing: border-box;
      margin-top: 10px;
    }

    .segment {
      flex: 1;
      background: transparent;
    }

    .segment.active {
      background: #000080;
    }
  </style>
</head>

<body>

  <div class="window">

    <div class="title-bar">
      <div class="title-bar-text">System Redirect</div>
    </div>

    <div class="window-body content">
      <p><strong>REDIRECTING...</strong></p>
      <p>Please wait while the system processes your request.</p>

      <div class="seg-bar" id="segBar"></div>
    </div>

  </div>

  <script>
    const bar = document.getElementById("segBar");

    const segments = 20;

    // create segments
    for (let i = 0; i < segments; i++) {
      const div = document.createElement("div");
      div.classList.add("segment");
      bar.appendChild(div);
    }

    const nodes = document.querySelectorAll(".segment");
    let i = 0;

    const interval = setInterval(() => {
      nodes[i].classList.add("active");
      i++;

      if (i >= segments) {
        clearInterval(interval);
        setTimeout(() => {
          window.location.href = "https://secdown.github.io/95button.html";
        }, 300);
      }
    }, 500);
  </script>

</body>
</html>
