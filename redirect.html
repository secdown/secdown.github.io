<script>
    const bar = document.getElementById("segBar");
    const segments = 20;

    // Create segments
    for (let i = 0; i < segments; i++) {
      const div = document.createElement("div");
      div.classList.add("segment");
      bar.appendChild(div);
    }

    const nodes = document.querySelectorAll(".segment");
    let i = 0;

    // Changed from 120 to 500 for a 10-second total duration
    const interval = setInterval(() => {
      if (i < segments) {
        nodes[i].classList.add("active");
        i++;
      }

      if (i >= segments) {
        clearInterval(interval);
        setTimeout(() => {
          window.location.href = "https://secdown.github.io/wheresthemoney";
        }, 500); // Slight pause at the end for effect
      }
    }, 500); 
  </script>
